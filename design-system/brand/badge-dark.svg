<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 28" width="220" height="28">
  <defs>
    <style>
      @font-face {
        font-family: 'Silkscreen';
        font-style: normal;
        font-weight: 400;
        src: url(data:font/woff2;base64,) format('woff2');
      }
    </style>
    <radialGradient id="dot-hl" cx="38%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#aeeae0"/>
      <stop offset="100%" stop-color="#56dbd0"/>
    </radialGradient>
  </defs>
  <!-- Pill background -->
  <rect x="0.5" y="0.5" width="219" height="27" rx="13.5" fill="#292524" stroke="#44403c" stroke-width="1"/>
  <!-- Holographic dot -->
  <circle cx="18" cy="14" r="6" fill="url(#dot-hl)"/>
  <!-- Badge text -->
  <text font-family="'Silkscreen', monospace" font-size="10" font-weight="400" fill="#fafaf9" dominant-baseline="central" y="14" x="30">Made in UNICORN.LAND</text>
