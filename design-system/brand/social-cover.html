<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 1500px;
      height: 500px;
      background: #fafaf9;
      gap: 24px;
    }
    .wordmark {
      font-family: 'Silkscreen', cursive;
      font-size: 56px;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, #56dbd0, #64b5f6, #ba68c8, #f0a4c8, #e8c170, #81c784, #56dbd0);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbow-flow 6s ease infinite;
    }
    @keyframes rainbow-flow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .rule { width: 64px; height: 2px; background: #56dbd0; }
    .tagline {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      color: #78716c;
      font-weight: 400;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="wordmark">UNICORN.LAND</div>
  <div class="rule"></div>
  <div class="tagline">Making the invisible visible</div>
</body>
</html>
