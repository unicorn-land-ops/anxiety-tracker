<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 400px;
      height: 400px;
      background: #fafaf9;
    }
    .dot {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: linear-gradient(135deg, #56dbd0, #64b5f6, #ba68c8, #f0a4c8, #e8c170, #81c784, #56dbd0);
      background-size: 300% 300%;
      animation: holo 6s ease infinite;
      position: relative;
      overflow: hidden;
    }
    .dot::after {
      content: '';
      position: absolute;
      top: 10%; left: 10%;
      width: 80%; height: 80%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.45), transparent 60%);
    }
    @keyframes holo {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
  </style>
</head>
<body><div class="dot"></div></body>
</html>
